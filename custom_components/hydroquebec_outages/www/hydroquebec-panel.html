<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hydro-Québec Outages</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: Roboto, sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; }

  #header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px; height: 52px; flex-shrink: 0;
    background: #003da5; color: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
  }
  #header h1 { font-size: 16px; font-weight: 500; flex: 1; letter-spacing: .3px; }
  #last-updated { font-size: 12px; opacity: .8; }
  #refresh-btn {
    cursor: pointer; padding: 5px 14px; font-size: 13px;
    border: 1.5px solid rgba(255,255,255,.6); border-radius: 6px;
    background: transparent; color: #fff; transition: background .15s;
  }
  #refresh-btn:hover   { background: rgba(255,255,255,.18); }
  #refresh-btn:disabled{ opacity: .45; cursor: default; }

  #legend {
    display: flex; flex-wrap: wrap; gap: 4px 16px; align-items: center;
    padding: 6px 16px; font-size: 12px; flex-shrink: 0;
    background: #f5f5f5; border-bottom: 1px solid #ddd;
    color: #333;
  }
  .leg  { display: flex; align-items: center; gap: 5px; }
  .sw   { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid; flex-shrink: 0; }
  .sw-o { background: rgba(229,57,53,.4);  border-color: #b71c1c; }
  .sw-p { background: rgba(251,140,0,.35); border-color: #e65100; }
  .sw-n { background: #1565c0; border-color: #0d47a1; border-radius: 50%; }
  #status { margin-left: auto; color: #1565c0; font-style: italic; }

  #map { flex: 1; }

  #error-bar {
    display: none; padding: 8px 16px; font-size: 13px;
    background: #ffebee; color: #c62828; border-top: 1px solid #ef9a9a;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="#FFD600" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </svg>
    <h1>Hydro-Québec Outages</h1>
    <span id="last-updated"></span>
    <button id="refresh-btn">↺&nbsp;Refresh</button>
  </div>

  <div id="legend">
    <div class="leg"><div class="sw sw-o"></div>Active outage area</div>
    <div class="leg"><div class="sw sw-p"></div>Planned interruption area</div>
    <div class="leg"><div class="sw sw-n"></div>Monitored location</div>
    <span id="status">Loading…</span>
  </div>

  <div id="map"></div>
  <div id="error-bar"></div>
</div>

<script>
// ── Config from URL params ────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
let   locations = [];
try { locations = JSON.parse(decodeURIComponent(params.get("locations") || "[]")); } catch(_){}

// ── Auth: HA iframe panels receive a Bearer token via postMessage ─────────
// Store it when it arrives; fall back to cookie-based session (works for /local/)
let _token = null;

window.addEventListener("message", (ev) => {
  // HA parent posts {type:"auth/result", result:{access_token:...}}
  // or simply {access_token: ...}
  const d = ev.data || {};
  if (d.access_token)                       _token = d.access_token;
  if (d.result?.access_token)               _token = d.result.access_token;
  if (d.type === "auth/result" && d.result) _token = d.result.access_token;
});

// Ask the parent frame for an auth token (HA responds to this)
try { window.parent.postMessage({ type: "auth/get_token" }, "*"); } catch(_){}

function authHeaders() {
  return _token ? { Authorization: `Bearer ${_token}` } : {};
}

// ── KML parser ────────────────────────────────────────────────────────────
function parseKmlPolygons(kml) {
  if (!kml) return [];
  const doc  = new DOMParser().parseFromString(kml, "text/xml");
  const out  = [];
  doc.querySelectorAll("Placemark").forEach(pm => {
    const name = pm.querySelector("name")?.textContent?.trim() ?? "";
    const desc = pm.querySelector("description")?.textContent?.trim() ?? "";
    pm.querySelectorAll("Polygon").forEach(poly => {
      const el = poly.querySelector("outerBoundaryIs coordinates")
              || poly.querySelector("outerBoundaryIs LinearRing coordinates")
              || poly.querySelector("coordinates");
      if (!el) return;
      const coords = el.textContent.trim().split(/\s+/).map(t => {
        const p = t.split(",");
        const lon = parseFloat(p[0]), lat = parseFloat(p[1]);
        return (isNaN(lat) || isNaN(lon)) ? null : [lat, lon];
      }).filter(Boolean);
      if (coords.length > 2) out.push({ name, desc, coords });
    });
  });
  return out;
}

// ── Leaflet map ───────────────────────────────────────────────────────────
const C = {
  out: { fill:"#e53935", border:"#b71c1c" },
  pln: { fill:"#fb8c00", border:"#e65100" },
  pin: "#1565c0",
  rad: { fill:"rgba(21,101,192,0.07)", border:"#1565c0" },
};

const map = L.map("map").setView([46.8, -71.2], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

const lyr = {
  out: L.layerGroup().addTo(map),
  pln: L.layerGroup().addTo(map),
  pin: L.layerGroup().addTo(map),
  rad: L.layerGroup().addTo(map),
};

L.control.layers(null, {
  "🔴 Active outages":        lyr.out,
  "🟠 Planned interruptions": lyr.pln,
  "📍 Monitored locations":   lyr.pin,
  "⭕ Search radius":          lyr.rad,
}, { collapsed: false }).addTo(map);

// ── Fetch & render ────────────────────────────────────────────────────────
async function load() {
  setStatus("Fetching…");
  showError(null);
  document.getElementById("refresh-btn").disabled = true;
  try {
    const r = await fetch("/api/hydroquebec_outages/data", { headers: authHeaders() });
    if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
    render(await r.json());
  } catch(e) {
    console.error("[HQ Panel]", e);
    setStatus("Error");
    showError("Could not load outage data: " + e.message);
  } finally {
    document.getElementById("refresh-btn").disabled = false;
  }
}

function render(d) {
  Object.values(lyr).forEach(l => l.clearLayers());

  const bisPolys = parseKmlPolygons(d.bis_kml);
  const aipPolys = parseKmlPolygons(d.aip_kml);

  // Outage polygons
  bisPolys.forEach(({name, desc, coords}) =>
    L.polygon(coords, { color:C.out.border, fillColor:C.out.fill, fillOpacity:.38, weight:1.5 })
     .bindPopup(`<b>🔴 Active Outage Area</b>${name?`<br>${name}`:""}${desc?`<br><small>${desc}</small>`:""}`)
     .addTo(lyr.out));

  // Planned polygons  
  aipPolys.forEach(({name, desc, coords}) =>
    L.polygon(coords, { color:C.pln.border, fillColor:C.pln.fill, fillOpacity:.30, weight:1.5, dashArray:"7 5" })
     .bindPopup(`<b>🟠 Planned Interruption Area</b>${name?`<br>${name}`:""}${desc?`<br><small>${desc}</small>`:""}`)
     .addTo(lyr.pln));

  // Outage point markers
  (d.outages ?? []).forEach(o => {
    if (o.latitude == null) return;
    L.circleMarker([o.latitude, o.longitude], { radius:8, color:C.out.border, fillColor:C.out.fill, fillOpacity:.9, weight:2 })
     .bindPopup(`<b>🔴 Active Outage</b><br>
       <b>Customers:</b> ${o.customers_affected ?? "?"}<br>
       <b>Cause:</b> ${o.cause ?? "?"}<br>
       <b>Status:</b> ${o.status ?? "?"}<br>
       <b>Started:</b> ${o.start_time ?? "?"}<br>
       <b>Est. end:</b> ${o.estimated_end_time ?? "?"}`)
     .addTo(lyr.out);
  });

  // Planned point markers
  (d.planned ?? []).forEach(p => {
    if (p.latitude == null) return;
    L.circleMarker([p.latitude, p.longitude], { radius:8, color:C.pln.border, fillColor:C.pln.fill, fillOpacity:.9, weight:2 })
     .bindPopup(`<b>🟠 Planned Interruption</b><br>
       <b>Customers:</b> ${p.customers_affected ?? "?"}<br>
       <b>Cause:</b> ${p.cause ?? "?"}<br>
       <b>Status:</b> ${p.status ?? "?"}<br>
       <b>Start:</b> ${p.planned_start ?? "?"}<br>
       <b>End:</b> ${p.planned_end ?? "?"}`)
     .addTo(lyr.pln);
  });

  // Location pins + radius rings
  locations.forEach(loc => {
    if (loc.latitude == null) return;
    L.marker([loc.latitude, loc.longitude], { icon: L.divIcon({
      className: "",
      html: `<div style="width:14px;height:14px;border-radius:50%;background:${C.pin};border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45)"></div>`,
      iconAnchor: [7,7],
    })}).bindPopup(`<b>📍 ${loc.name ?? "Location"}</b>`).addTo(lyr.pin);

    if (loc.radius_km) {
      L.circle([loc.latitude, loc.longitude], {
        radius: loc.radius_km * 1000,
        color:C.rad.border, fillColor:C.rad.fill, fillOpacity:1, weight:1.5, dashArray:"5 5",
      }).bindTooltip(`${loc.name ?? "Location"} — ${loc.radius_km} km`, {sticky:true})
        .addTo(lyr.rad);
    }
  });

  // Fit bounds
  const allPolys = [...bisPolys, ...aipPolys];
  if (allPolys.length) {
    try { map.fitBounds(allPolys.flatMap(p => p.coords), { padding:[40,40] }); } catch(_){}
  } else if (locations.length) {
    map.setView([locations[0].latitude, locations[0].longitude], 11);
  }

  // Status bar
  const oc = (d.outages??[]).length, pc = (d.planned??[]).length;
  setStatus(`${oc} outage${oc!==1?"s":""} · ${pc} planned · ${allPolys.length} polygon${allPolys.length!==1?"s":""}`);

  const lu = d.last_updated ? new Date(d.last_updated+"Z").toLocaleTimeString() : "";
  document.getElementById("last-updated").textContent = lu ? `Updated ${lu}` : "";
}

function setStatus(msg) { document.getElementById("status").textContent = msg; }
function showError(msg) {
  const el = document.getElementById("error-bar");
  el.style.display = msg ? "block" : "none";
  el.textContent   = msg ?? "";
}

document.getElementById("refresh-btn").addEventListener("click", load);
setInterval(load, 15 * 60 * 1000);
load();
</script>
</body>
</html>
